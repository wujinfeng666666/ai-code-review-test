name: AI Code Review (Gemini)
on:
  pull_request:
    types: [opened, synchronize]

# 必须权限
permissions:
  pull-requests: write
  contents: read

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      # 修复 Node.js 20 弃用警告
      - name: Enable Node.js 24
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      # 使用 Python 3.11 消除版本警告
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 真正支持自动 PR 审查的 Action
      - name: Gemini Code Review
        uses: qxo-oss/gemini-code-review-action@v1
        with:
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # 可自定义审查语言：zh-CN / en
          language: zh-CN
